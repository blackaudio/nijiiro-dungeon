<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日常ダンジョン</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:#111;
  color:white;
  font-family:serif;
  text-align:center;
  overflow:hidden;
  padding-bottom:100px;
}

h2 { margin-top:35px; text-shadow:0 0 8px white; }
#floor { opacity:0.6; margin-top:-10px; font-size:14px; }

#langUI {
  margin-top:12px;
  margin-bottom:28px;
  opacity:0.8;
}

#langUI button {
  margin:0 6px;
  padding:6px 18px;
  border-radius:18px;
  border:1px solid #555;
  background:#111;
  color:#aaa;
  font-family:serif;
  cursor:pointer;
}

#langUI button.active {
  color:#fff;
  border-color:#fff;
  box-shadow:0 0 12px white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(5, min(18vw, 70px));
  gap:5px;
  justify-content:center;
  margin-top:35px;
}

.cell {
  width:min(18vw, 70px);
  height:min(18vw, 70px);
  background:#111;
  border:1px solid #252525;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  transition:transform 0.08s ease;
}

.cell.flash {
  background:#f5f5f5;
  border-color:#fff;
  box-shadow:0 0 18px white;
  transition:0.15s;
}

.cell.otherworld-panel {
  background:radial-gradient(circle, #c000ff 0%, #52006b 55%, #16001f 100%);
  border-color:#e36bff;
  box-shadow:0 0 18px #b000ff, inset 0 0 16px #2b0038;
  animation:nyuruPulse 1.15s infinite ease-in-out;
}

#text { margin-top:30px; font-size:18px; opacity:0.8; }

body.otherworld {
  background:#16001f !important;
  filter:contrast(1.18) saturate(1.35);
}

body.otherworld h2 {
  text-shadow:0 0 10px #e47cff;
}

body.otherworld #text {
  color:#e9b5ff;
  text-shadow:0 0 10px #b000ff;
  letter-spacing:1px;
}

body.otherworld #floor {
  color:#e9b5ff;
  text-shadow:0 0 8px #b000ff;
}

.gameover #text {
  color:#ff2222;
  font-size:28px;
  text-shadow:0 0 10px red;
}

.red-word, .white-word, .purple-word {
  position:fixed;
  font-size:22px;
  pointer-events:none;
  animation:tremble 0.08s infinite alternate;
}

.red-word { color:#b00000; opacity:0.65; text-shadow:0 0 8px red; }
.white-word { color:#fff; opacity:0.7; text-shadow:0 0 10px white; }
.purple-word { color:#d77cff; opacity:0.45; text-shadow:0 0 10px #c000ff; }

#retryBtn {
  position:fixed;
  left:50%;
  top:55%;
  transform:translate(-50%, -50%) scale(0.65);
  opacity:0;
  pointer-events:none;

  background:#050000;
  color:#b00000;
  border:1px solid #500;
  padding:10px 18px;
  font-family:serif;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;

  transition:0.28s cubic-bezier(.2,1.6,.5,1);
  box-shadow:0 0 12px rgba(180,0,0,0.8);
}

#retryBtn.show {
  opacity:0.85;
  pointer-events:auto;
  transform:translate(-50%, -50%) scale(1);
}

@keyframes tremble {
  from { transform:translate(0,0); }
  to { transform:translate(2px,-1px); }
}

@keyframes nyuruPulse {
  0% { transform:scale(1) skew(0deg); filter:hue-rotate(0deg); }
  50% { transform:scale(1.08) skew(4deg); filter:hue-rotate(28deg); }
  100% { transform:scale(1) skew(0deg); filter:hue-rotate(0deg); }
}
</style>
</head>

<body>
<h2>日常ダンジョン</h2>

<div id="langUI">
  <button id="btn-ja" onclick="setLang('ja')">JP</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
  <button id="btn-ko" onclick="setLang('ko')">KO</button>
</div>

<div id="floor">地下 1 階</div>
<div class="grid" id="grid"></div>
<div id="text">触れてもいい</div>
<button id="retryBtn">それでも潜る</button>

<script>
const grid = document.getElementById("grid");
const text = document.getElementById("text");
const floorText = document.getElementById("floor");
const retryBtn = document.getElementById("retryBtn");

const tapSound = new Audio("https://cdn.jsdelivr.net/gh/jshawl/AudioFX/sounds/click1.wav");
tapSound.volume = 0.12;

const rareSound = new Audio("https://cdn.jsdelivr.net/gh/jshawl/AudioFX/sounds/powerup1.wav");
rareSound.volume = 0.18;

let floor = 1;
let playCount = 0;
let mistakes = 0;
let safeCount = 0;
let safeStreak = 0;
let ended = false;
let lang = "ja";

let dangerSet = new Set();
let near = new Set();
let clicked = new Set();

let isOtherworld = false;
let otherworldFloor = 0;
let showNuFloor = false;

const OTHERWORLD_MAX = 3;

const otherworldTexts = [
  "にゅーん　ν階層　かえれなゐ",
  "おな゙みはゎ　あゐこσεかゕ",
  "まζみ　ゑらばれし　αβのした",
  "ν階層　まだ　かえれなゐ",
  "ゐつもの日常は　λれてゐる"
];

const texts = {
  ja: {
    safe: ["静かだ","ここはまだやさしい","光がやわらかい","何もない","見られてる気がする"],
    near: ["少し湿っている","誰かが通った気がする","空気が少しだけ違う","近くにある","すぐ近くにいる"],
    danger: ["ここは……さっきと同じ？","踏んだ","今、ずれた","見つかってしまった","誰の息遣い？"],
    next: ["床が沈む","下へ行ける","階段があった","もう少し深く"],
    start: "触れてもいい",
    guide: "マスに触れて、下への抜け道を探そう",
    omen: "床の奥で、何かが光った",
    floorGlow: "床が光る",
    rareFall: n => "地下 " + n + " 階まで、落ちる",
    tooDeep: "深すぎる",
    fall: "落ちる",
    gameOver: n => "地下 " + n + " 階で、もう戻れない",
    noWayBack: "もう戻れない",
    retry: "それでも潜る",
    floorLabel: n => "地下 " + n + " 階",

    otherworldEnter: "にゅーん　ν階層　かえれなゐ",
    otherworldPanel: "床が、ニュルニュルしている",
    otherworldClear: "ぜんぶ　ゆるされた",
    otherworldBonus: n => n + "にゅーん　ゆるされた",
    otherworldFloorLabel: n => "ν階層 " + n
  },

  en: {
    safe: ["quiet","still safe here","soft light","nothing here","feels watched"],
    near: ["slightly damp","someone passed","air feels different","something nearby","very close"],
    danger: ["same as before?","stepped on it","it shifted","found you","someone breathing"],
    next: ["floor sinks","you can go down","stairs appeared","deeper still"],
    start: "you can touch",
    guide: "Touch tiles to find a way down",
    omen: "something flickered below",
    floorGlow: "the floor glows",
    rareFall: n => "falling to Floor " + n,
    tooDeep: "too deep",
    fall: "fall",
    gameOver: n => "Floor " + n + ". No way back.",
    noWayBack: "no way back",
    retry: "still go down",
    floorLabel: n => "Floor " + n,

    otherworldEnter: "nyuun　ν layer　no way baλk",
    otherworldPanel: "the floor writhes",
    otherworldClear: "everything was forgiven",
    otherworldBonus: n => n + " nyuun forgiven",
    otherworldFloorLabel: n => "ν layer " + n
  },

  ko: {
    safe: ["조용하다","아직 괜찮다","빛이 부드럽다","아무것도 없다","누군가 보는 느낌"],
    near: ["조금 축축하다","누군가 지나간 듯","공기가 다르다","가까이에 있다","바로 근처"],
    danger: ["여기… 아까랑 같아?","밟았다","지금 흔들렸다","들켰다","숨소리"],
    next: ["바닥이 내려간다","아래로 갈 수 있다","계단이 있다","더 깊이"],
    start: "만져도 된다",
    guide: "타일을 눌러 아래로 내려가는 길을 찾아",
    omen: "바닥 아래 무언가 빛났다",
    floorGlow: "바닥이 빛난다",
    rareFall: n => "지하 " + n + "층까지 떨어진다",
    tooDeep: "너무 깊다",
    fall: "추락",
    gameOver: n => "지하 " + n + "층, 이제 돌아갈 수 없다",
    noWayBack: "돌아갈 수 없다",
    retry: "그래도 내려간다",
    floorLabel: n => "지하 " + n + "층",

    otherworldEnter: "뉴운　ν계층　돌아갈 수 업ζ다",
    otherworldPanel: "바닥이 꿈틀거린다",
    otherworldClear: "전부 용서되었다",
    otherworldBonus: n => n + "뉴운　용서되었다",
    otherworldFloorLabel: n => "ν계층 " + n
  }
};

function pick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function play(sound){
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function updateLangButtons() {
  document.querySelectorAll("#langUI button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + lang).classList.add("active");
}

function setLang(newLang) {
  lang = newLang;
  buildFloor();
}

function neighbors(idx) {
  const x = idx % 5;
  const y = Math.floor(idx / 5);
  const n = [];
  if (x > 0) n.push(idx - 1);
  if (x < 4) n.push(idx + 1);
  if (y > 0) n.push(idx - 5);
  if (y < 4) n.push(idx + 5);
  return n;
}

function makeDangers(count) {
  dangerSet.clear();
  while (dangerSet.size < count) {
    dangerSet.add(Math.floor(Math.random() * 25));
  }
}

function makeNear() {
  near.clear();
  dangerSet.forEach(d => {
    neighbors(d).forEach(n => {
      if (!dangerSet.has(n)) near.add(n);
    });
  });
}

function getDepthColor() {
  if (floor >= 200) return "#000010";
  if (floor >= 150) return "#100010";
  if (floor >= 100) return "#001010";
  if (floor >= 50) return "#100000";
  return "#111";
}

function whiteFlood(message){
  for (let i = 0; i < 70; i++) {
    const word = document.createElement("div");
    word.className = "white-word";
    word.innerText = message;
    word.style.left = Math.random() * 100 + "vw";
    word.style.top = Math.random() * 100 + "vh";
    word.style.fontSize = (12 + Math.random() * 32) + "px";
    word.style.opacity = 0.25 + Math.random() * 0.55;
    document.body.appendChild(word);
  }
}

function purpleFlood(message){
  for (let i = 0; i < 38; i++) {
    const word = document.createElement("div");
    word.className = "purple-word";
    word.innerText = message;
    word.style.left = Math.random() * 100 + "vw";
    word.style.top = Math.random() * 100 + "vh";
    word.style.fontSize = (12 + Math.random() * 26) + "px";
    word.style.opacity = 0.2 + Math.random() * 0.45;
    document.body.appendChild(word);
  }
}

function showNuThenFloor(){
  showNuFloor = true;
  floorText.innerText = "ν";

  setTimeout(() => {
    showNuFloor = false;
    floorText.innerText = texts[lang].floorLabel(floor);
  }, 650);
}

function enterOtherworld(){
  isOtherworld = true;
  otherworldFloor = 1;
  play(rareSound);
  purpleFlood("ν");
  buildFloor();
}

function exitOtherworld(bonus){
  isOtherworld = false;
  otherworldFloor = 0;

  floor += bonus;

  document.body.classList.remove("otherworld");
  document.querySelectorAll(".purple-word").forEach(e => e.remove());

  buildFloor();

  showNuThenFloor();

  text.innerText = bonus === 1000
    ? texts[lang].otherworldClear
    : texts[lang].otherworldBonus(bonus);
}

function buildFloor() {
  grid.innerHTML = "";
  clicked.clear();
  safeCount = 0;
  safeStreak = 0;
  mistakes = 0;
  ended = false;

  retryBtn.classList.remove("show");
  retryBtn.innerText = texts[lang].retry;

  updateLangButtons();

  document.body.classList.remove("gameover");
  document.body.classList.toggle("otherworld", isOtherworld);
  document.body.style.background = isOtherworld ? "#16001f" : getDepthColor();
  document.body.style.transform = "none";
  document.querySelectorAll(".red-word, .white-word").forEach(e => e.remove());

  if (!showNuFloor) {
    floorText.innerText = isOtherworld
      ? texts[lang].otherworldFloorLabel(otherworldFloor)
      : texts[lang].floorLabel(floor);
  }

  if (isOtherworld) {
    text.innerText = otherworldFloor === 1
      ? texts[lang].otherworldEnter
      : pick(otherworldTexts);
  } else {
    text.innerText = floor === 1 ? texts[lang].start : pick(texts[lang].next);
  }

  if (floor === 1 && playCount === 0 && !isOtherworld) {
    setTimeout(() => {
      text.innerText = texts[lang].guide;
    }, 800);
  }

  const dangerCount = isOtherworld
    ? Math.min(4 + otherworldFloor, 8)
    : Math.min(3 + floor - 1, 8);

  makeDangers(dangerCount);
  makeNear();

  let rarePanel = -1;
  let rareJump = 0;
  let otherworldPanel = -1;

  const baseChance = 0.08;
  const bonus = Math.min(playCount * 0.02, 0.2);
  const omen = !isOtherworld && Math.random() < (baseChance + bonus);

  if (omen) {
    text.innerText = texts[lang].omen;

    if (Math.random() < 0.5) {
      do {
        rarePanel = Math.floor(Math.random() * 25);
      } while (dangerSet.has(rarePanel));

      rareJump = 10 + Math.floor(Math.random() * 41);
    }

    if (Math.random() < 0.5) {
      do {
        otherworldPanel = Math.floor(Math.random() * 25);
      } while (
        dangerSet.has(otherworldPanel) ||
        otherworldPanel === rarePanel
      );
    }
  }

  for (let i = 0; i < 25; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    if (i === otherworldPanel) {
      cell.classList.add("otherworld-panel");
    }

    cell.onclick = () => {
      if (ended || clicked.has(i)) return;

      play(tapSound);
      clicked.add(i);

      cell.style.transform = "scale(0.97)";
      setTimeout(() => cell.style.transform = "scale(1)", 80);

      if (i === otherworldPanel) {
        text.innerText = texts[lang].otherworldPanel;
        setTimeout(() => enterOtherworld(), 650);
        return;
      }

      cell.style.background = "#333";
      setTimeout(() => cell.style.background = isOtherworld ? "#16001f" : getDepthColor(), 120);

      if (!isOtherworld && i === rarePanel && rareJump > 0 && Math.random() < 0.15) {
        play(rareSound);

        const superJump = 1000 + Math.floor(Math.random() * 9000);
        text.innerText = texts[lang].tooDeep;
        whiteFlood(texts[lang].fall);

        setTimeout(() => {
          floor += superJump;
          buildFloor();
        }, 1200);

        return;
      }

      if (!isOtherworld && i === rarePanel) {
        play(rareSound);

        text.innerText = texts[lang].rareFall(floor + rareJump);

        document.querySelectorAll(".cell").forEach((c, index) => {
          setTimeout(() => c.classList.add("flash"), index * 10);
        });

        setTimeout(() => {
          floor += rareJump;
          buildFloor();
        }, 900);

        return;
      }

      if (dangerSet.has(i)) {
        text.innerText = isOtherworld ? pick(otherworldTexts) : pick(texts[lang].danger);
        mistakes++;
        safeStreak = 0;
        document.body.style.transform = "translateX(4px)";
        setTimeout(() => document.body.style.transform = "none", 100);
        cell.style.borderColor = isOtherworld ? "#b000ff" : "#770000";
      } else if (near.has(i)) {
        text.innerText = isOtherworld ? pick(otherworldTexts) : pick(texts[lang].near);
        safeCount++;
        safeStreak++;
        cell.style.borderColor = isOtherworld ? "#7f3a99" : "#444";
      } else {
        text.innerText = isOtherworld ? pick(otherworldTexts) : pick(texts[lang].safe);
        safeCount++;
        safeStreak++;
        cell.style.borderColor = isOtherworld ? "#5c2870" : "#333";
      }

      if (safeStreak >= 3 && Math.random() < 0.6) {
        document.body.style.transform = "translateY(2px)";
        setTimeout(() => document.body.style.transform = "none", 80);

        cell.classList.add("flash");
        setTimeout(() => cell.classList.remove("flash"), 120);
      }

      if (mistakes >= 3) {
        if (isOtherworld) {
          const failBonus = otherworldFloor * 100;
          exitOtherworld(failBonus);
        } else {
          gameOver();
        }
        return;
      }

      if (safeCount >= 5) {
        text.innerText = isOtherworld ? pick(otherworldTexts) : texts[lang].floorGlow;

        document.querySelectorAll(".cell").forEach((c, index) => {
          setTimeout(() => c.classList.add("flash"), index * 18);
        });

        setTimeout(() => {
          if (isOtherworld) {
            if (otherworldFloor >= OTHERWORLD_MAX) {
              exitOtherworld(1000);
            } else {
              otherworldFloor++;
              buildFloor();
            }
          } else {
            floor++;
            buildFloor();
          }
        }, 900);
      }
    };

    grid.appendChild(cell);
  }
}

function gameOver(){
  ended = true;
  document.body.classList.add("gameover");
  document.body.style.background = "#050000";
  document.body.style.transform = "translateX(3px) skewX(1deg)";
  text.innerText = texts[lang].gameOver(floor);

  for (let i = 0; i < 45; i++) {
    const word = document.createElement("div");
    word.className = "red-word";
    word.innerText = texts[lang].noWayBack;
    word.style.left = Math.random() * 100 + "vw";
    word.style.top = Math.random() * 100 + "vh";
    word.style.fontSize = (14 + Math.random() * 28) + "px";
    word.style.opacity = 0.25 + Math.random() * 0.5;
    document.body.appendChild(word);
  }

  setTimeout(() => {
    retryBtn.classList.add("show");
  }, 3000);
}

retryBtn.onclick = () => {
  floor = 1;
  playCount++;
  isOtherworld = false;
  otherworldFloor = 0;
  retryBtn.classList.remove("show");
  buildFloor();
};

buildFloor();
</script>
</body>
</html>
